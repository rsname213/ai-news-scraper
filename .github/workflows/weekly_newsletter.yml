name: AI Pulse — Weekly Newsletter

on:
  schedule:
    # Every Monday at 7:00 AM EST (12:00 UTC)
    - cron: "0 12 * * 1"

  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI
    # Useful for testing before the Monday schedule runs
    inputs:
      dry_run:
        description: "Dry run — generate newsletter but do not send email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  send_newsletter:
    name: Generate & Send AI Pulse
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to commit updated seen_articles.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Pulse pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LOOKBACK_DAYS: "7"
          MAX_ARTICLES_PER_SECTION: "8"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py

      - name: Commit updated seen articles
        # Only commit if seen_articles.json was modified
        run: |
          git config user.name "AI Pulse Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_articles.json
          git diff --staged --quiet || \
            git commit -m "chore: update seen articles [$(date -u '+%Y-%m-%d')]"
          git push
